; Pool tuning for a small VPS running multiple Laravel apps.
; Each PHP process ~30-40MB; keep max_children low to share RAM.
; Bump these if the host has more RAM or this app gets heavy traffic.

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 4
pm.start_servers = 1
pm.min_spare_servers = 1
pm.max_spare_servers = 2
pm.max_requests = 500

; Recycle workers if they idle long
pm.process_idle_timeout = 60s

; Log slow PHP requests (>2s) to stderr
request_slowlog_timeout = 2s
slowlog = /proc/self/fd/2

; Send php-fpm logs to stderr so docker logs picks them up
catch_workers_output = yes
decorate_workers_output = no
